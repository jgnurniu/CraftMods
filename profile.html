<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — CraftMods</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<main class="page">
  <div class="container" style="padding-top:2.5rem;padding-bottom:5rem;" id="profile-root">

    <!-- Profile Header -->
    <div class="profile-header">
      <div class="avatar-large" id="profile-avatar" style="background:hsl(142 60% 35%);">CM</div>
      <div class="profile-info">
        <div class="profile-name-row">
          <span class="profile-name" id="profile-name">Loading…</span>
          <span class="role-badge" id="profile-role">Member</span>
        </div>
        <div class="profile-email" id="profile-email">—</div>
        <div class="profile-since">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
            <line x1="16" x2="16" y1="2" y2="6"/>
            <line x1="8" x2="8" y1="2" y2="6"/>
            <line x1="3" x2="21" y1="10" y2="10"/>
          </svg>
          <span id="profile-since">—</span>
        </div>
      </div>
      <div class="profile-stats">
        <div>
          <div class="profile-stat-val" id="stat-purchases">—</div>
          <div class="profile-stat-label">Purchases</div>
        </div>
        <div>
          <div class="profile-stat-val" id="stat-spent">—</div>
          <div class="profile-stat-label">Total Spent</div>
        </div>
      </div>
    </div>

    <!-- 2-column grid -->
    <div class="profile-grid">

      <!-- Left: purchases -->
      <div class="card-panel">
        <div class="panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
            <path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
            <path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>
          </svg>
          <span class="panel-title">My Purchases</span>
          <span class="panel-count" id="purchases-count"></span>
        </div>
        <div id="purchases-list">
          <!-- shimmer -->
          <div style="display:flex;flex-direction:column;gap:10px;padding:4px 0;">
            <div style="display:flex;gap:12px;align-items:center;">
              <div class="shimmer" style="width:32px;height:32px;border-radius:4px;flex-shrink:0;"></div>
              <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
                <div class="shimmer" style="height:12px;width:55%;border-radius:4px;"></div>
                <div class="shimmer" style="height:10px;width:35%;border-radius:4px;"></div>
              </div>
              <div class="shimmer" style="width:40px;height:12px;border-radius:4px;"></div>
            </div>
            <div style="display:flex;gap:12px;align-items:center;">
              <div class="shimmer" style="width:32px;height:32px;border-radius:4px;flex-shrink:0;"></div>
              <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
                <div class="shimmer" style="height:12px;width:65%;border-radius:4px;"></div>
                <div class="shimmer" style="height:10px;width:40%;border-radius:4px;"></div>
              </div>
              <div class="shimmer" style="width:40px;height:12px;border-radius:4px;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: account settings -->
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="card-panel">
          <div class="panel-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
            <span class="panel-title">Account</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:2px;">
            <a href="catalog.html" class="settings-btn primary-link" style="display:flex;align-items:center;gap:8px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              Browse Mods
            </a>
            <a id="admin-link" href="admin.html" class="settings-btn hidden" style="color:hsl(270 76% 70%);display:flex;align-items:center;gap:8px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
              Admin Panel
            </a>
          </div>
        </div>

        <div class="card-panel">
          <div class="panel-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--destructive)" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>
            </svg>
            <span class="panel-title">Session</span>
          </div>
          <button class="settings-btn danger" id="btn-logout-profile" style="display:flex;align-items:center;gap:8px;color:var(--destructive);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            Sign Out
          </button>
        </div>

      </div>
    </div>

  </div>
</main>

<footer class="footer">
  <p>&copy; 2025 <a href="index.html">CraftMods</a>. Built for the community.</p>
</footer>

<div class="toast-container" id="toast-container"></div>
<script src="app.js"></script>
</body>
</html>
