<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — CraftMods</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="login-page">
  <div class="login-bloom"></div>

  <div class="login-box">
    <!-- Logo -->
    <a href="index.html" class="login-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>
      </svg>
      CraftMods
    </a>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to access your mods and purchases</p>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-signin">Sign In</button>
      <button class="tab-btn" id="tab-register">Create Account</button>
    </div>

    <!-- ── SIGN IN PANE ── -->
    <div id="pane-signin">
      <!-- Social -->
      <div class="social-btns">
        <button class="btn-social" onclick="socialNotice()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:hsl(210 20% 70%)">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button class="btn-social" onclick="socialNotice()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:hsl(210 20% 70%)">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>

      <div class="divider"><span>or continue with email</span></div>

      <form id="form-signin" novalidate>
        <div class="form-group">
          <label class="form-label" for="si-email">Email address</label>
          <input class="form-input" type="email" id="si-email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="si-pass">Password</label>
          <input class="form-input" type="password" id="si-pass" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <p class="login-switch">
        Don't have an account?
        <button id="link-register">Create one for free</button>
      </p>
    </div>

    <!-- ── REGISTER PANE ── -->
    <div id="pane-register" class="hidden">
      <form id="form-register" novalidate>
        <div class="form-group">
          <label class="form-label" for="rg-user">Username</label>
          <input class="form-input" type="text" id="rg-user" placeholder="CoolCrafter" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="rg-email">Email address</label>
          <input class="form-input" type="email" id="rg-email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="rg-pass">Password</label>
          <input class="form-input" type="password" id="rg-pass" placeholder="Min. 8 characters" required autocomplete="new-password"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="rg-pass2">Confirm Password</label>
          <input class="form-input" type="password" id="rg-pass2" placeholder="Repeat password" required autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
      </form>

      <p class="login-switch">
        Already have an account?
        <button id="link-signin">Sign in</button>
      </p>
    </div>

    <!-- Demo hint -->
    <div style="margin-top:20px;padding:12px;border-radius:8px;background:hsl(142 71% 45% / .08);border:1px solid hsl(142 71% 45% / .2);">
      <p style="font-size:.6875rem;color:hsl(142 71% 60%);text-align:center;line-height:1.5;">
        <strong>Demo admin:</strong> admin@craftmods.gg &nbsp;/&nbsp; Admin1234!
      </p>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/app.js"></script>
<script>
function socialNotice() {
  toast('Social login is not available in demo mode.', 'info');
}
</script>
</body>
</html>
