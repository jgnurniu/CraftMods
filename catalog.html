<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catalog — CraftMods</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<main class="page">
  <div class="container" style="padding-top:2.5rem; padding-bottom:5rem;">

    <!-- Header -->
    <div style="margin-bottom:2rem;">
      <h1 style="font-size:1.75rem;font-weight:700;letter-spacing:-.025em;margin-bottom:4px;">Mod Catalog</h1>
      <p style="font-size:.875rem;color:var(--muted);">Discover and download the best Minecraft mods</p>
    </div>

    <!-- Filters row -->
    <div class="filters-row">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="catalog-search" class="input-search" placeholder="Search mods, authors, tags…"/>
      </div>
      <div class="sort-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <select id="catalog-sort" class="input-select">
          <option value="downloads">Most Downloaded</option>
          <option value="newest">Newest First</option>
          <option value="rating">Highest Rated</option>
          <option value="price_asc">Price: Low to High</option>
        </select>
      </div>
      <div class="sort-wrap">
        <select id="catalog-price" class="input-select">
          <option value="">All Prices</option>
          <option value="free">Free Only</option>
          <option value="paid">Paid Only</option>
        </select>
      </div>
    </div>

    <!-- Category pills -->
    <div class="pills-row" id="pills-row"></div>

    <!-- Result count -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <span id="result-count" style="font-size:.75rem;color:var(--muted);"></span>
    </div>

    <!-- Grid -->
    <div class="mods-grid" id="catalog-grid">
      <!-- loaded by JS -->
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

  </div>
</main>

<footer class="footer">
  <p>&copy; 2025 <a href="index.html">CraftMods</a>. Built for the community.</p>
</footer>

<!-- PURCHASE MODAL -->
<div class="modal-overlay hidden" id="purchase-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">Complete Purchase</div>
        <div class="modal-sub">Secure checkout</div>
      </div>
      <button class="modal-close" id="btn-cancel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-mod-preview">
        <div class="modal-mod-img" id="modal-mod-img"></div>
        <div class="modal-mod-info">
          <div class="modal-mod-title" id="modal-mod-title"></div>
          <div class="modal-mod-author" id="modal-mod-author"></div>
          <div class="modal-mod-price" id="modal-mod-price"></div>
        </div>
      </div>
      <div>
        <label class="form-label">Card Number</label>
        <div style="position:relative;">
          <input class="input-fake" type="text" value="•••• •••• •••• ••••" readonly style="padding-right:40px;"/>
          <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          </span>
        </div>
      </div>
      <div class="input-grid">
        <div><label class="form-label">Expiry</label><input class="input-fake" type="text" value="••/••" readonly/></div>
        <div><label class="form-label">CVV</label><input class="input-fake" type="text" value="•••" readonly/></div>
      </div>
      <div class="modal-lock">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Demo mode — no real charge will occur.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="btn-cancel2">Cancel</button>
      <button class="btn-confirm" id="btn-confirm-pay">Pay</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="app.js"></script>
<script>
  document.getElementById('btn-cancel2')?.addEventListener('click', closePurchaseModal);
  // Pre-select category from URL param
  window.addEventListener('DOMContentLoaded', () => {
    const cat = new URLSearchParams(location.search).get('cat');
    if (cat) {
      setTimeout(() => {
        const btn = document.querySelector(`.cat-btn[data-cat="${cat}"]`);
        if (btn) btn.click();
      }, 100);
    }
  });
</script>
</body>
</html>
